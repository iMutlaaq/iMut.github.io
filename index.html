<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Evaluator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { background: #0070f3; color: white; padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #005bb5; }
    #output { margin-top: 24px; background: white; padding: 16px; border-radius: 8px; white-space: pre-wrap; border: 1px solid #ddd; min-height: 80px; }
  </style>
</head>
<body>
  <h1>🔍 App Evaluator</h1>
  <input id="query" type="text" placeholder="Enter your search query..." />
  <input id="app" type="text" placeholder="Enter app name..." />
  <button onclick="evaluate()">Evaluate</button>
  <div id="output">Results will appear here...</div>
  <script src="app.js"></script>
</body>
</html>
